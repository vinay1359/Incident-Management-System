version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: imsdb
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d imsdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: "postgresql+asyncpg://ims:ims123@postgres:5432/imsdb"
      MONGO_URL: "mongodb://mongo:27017"
      MONGO_DB: "ims_signals"
      REDIS_URL: "redis://redis:6379/0"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://backend:8000"
    restart: unless-stopped

volumes:
  pgdata:
  mongodata:
